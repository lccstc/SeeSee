<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent 终极召唤师终端</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --border: #334155;
            --completed: #3b82f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        h1, h2, h3 { margin-top: 0; }
        .chapter-title {
            color: var(--text-muted);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-top: 20px;
        }
        .level-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .level-btn:hover { background-color: rgba(255,255,255,0.05); }
        .level-btn.active { border-color: var(--accent); background-color: rgba(16, 185, 129, 0.1); }
        .level-btn.completed { border-left: 4px solid var(--completed); }
        
        .quest-card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border);
            max-width: 800px;
            margin: 0 auto;
        }
        .copy-prompt-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .copy-prompt-btn:hover { background-color: var(--accent-hover); }
        .checkbox-group { margin: 20px 0; }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: var(--border);
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🛠️ 技能树与进度</h2>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p style="font-size: 0.8em; color: var(--text-muted);" id="progressText">完成度: 0%</p>
        
        <div id="questList"></div>
    </div>

    <div class="main-content">
        <div class="quest-card" id="questDisplay">
            <h2>欢迎来到 Hermes 召唤师终端</h2>
            <p>请在左侧选择一个关卡开始你的试炼。你的进度会保存在本地浏览器中，关闭也不会丢失。</p>
            <p style="color: var(--accent);">👉 建议：每开启一个新关卡，点击下方的按钮复制专属 Prompt，然后在 AI 助手中开启一个<strong>全新的对话窗口</strong>进行闯关，以保持最清晰的上下文！</p>
        </div>
    </div>

    <script>
        const quests = [
            { id: 'lv1', chapter: '卷一：新手村', title: 'Lv.1 召唤仪式 (环境搭建)', desc: '第一步是安装与 Nix 环境配置。让 Hermes 在你的本地系统中安家。', tasks: ['安装基础依赖', '配置 Nix & NixOS', '成功运行安装指令'] },
            { id: 'lv2', chapter: '卷一：新手村', title: 'Lv.2 初次共鸣 (快速起步)', desc: '运行第一个实例，完成首次对话，确认大语言模型 API 与系统连接正常。', tasks: ['配置基础大模型 API', '完成首次对话'] },
            { id: 'lv3', chapter: '卷一：新手村', title: 'Lv.3 终端御术 (CLI 与配置)', desc: '掌握命令行参数，并修改核心 config.yaml 文件。', tasks: ['掌握快捷键与多行输入', '修改 ~/.hermes/config.yaml'] },
            { id: 'lv4', chapter: '卷二：进阶试炼', title: 'Lv.4 核心能力总览', desc: '熟悉 Hermes 的全部内置功能宏观图谱。', tasks: ['理解 Features 列表', '浏览 Key Features 表格'] },
            { id: 'lv5', chapter: '卷二：进阶试炼', title: 'Lv.5 灵魂注入 (上下文与人格)', desc: '利用 AGENTS.md 和 SOUL.md，赋予你的 Agent 持久的人格和项目背景。', tasks: ['编写全局 SOUL.md', '在项目根目录配置 AGENTS.md'] },
            { id: 'lv6', chapter: '卷二：进阶试炼', title: 'Lv.6 破壁者 (代码执行与浏览)', desc: '授予 Agent 读写文件、执行沙盒代码以及联网爬取网页的能力。', tasks: ['测试文件 I/O 能力', '使用内置浏览器抓取数据'] },
            { id: 'lv7', chapter: '卷三：网络使者', title: 'Lv.7 跨界部署 (TG & Discord)', desc: '将 Agent 接入 Telegram 或 Discord。你可以利用它打造一个协助处理中越翻译或自动回复的商务机器人分身。', tasks: ['配置 Telegram Bot Token', '设置 Home Channel', '测试多设备消息互通'] },
            { id: 'lv8', chapter: '卷三：网络使者', title: 'Lv.8 结界守卫 (安全与白名单)', desc: '配置权限隔离，防止未授权用户调用你的机器人，并学习如何审批危险指令。', tasks: ['设置平台 User Allowlist', '配置指令审批级别 (Always/Session/Once)'] },
            { id: 'lv9', chapter: '卷三：网络使者', title: 'Lv.9 语音觉醒 (Voice Mode)', desc: '开启语音模式，让机器人不仅能看懂，还能与你进行语音对讲。', tasks: ['配置语音模型 API', '测试音频输入输出'] },
            { id: 'lv10', chapter: '卷四：大师境界', title: 'Lv.10 私有算力 (本地大模型)', desc: '摆脱云端依赖！充分利用你那张 RTX 5090 显卡，结合 Ollama 等工具，在本地驱动 Hermes。', tasks: ['配置本地模型后端', '成功在 Windows 环境下调用本地大模型'] },
            { id: 'lv11', chapter: '卷四：大师境界', title: 'Lv.11 最佳实践指南', desc: '掌握官方 Tips：缓存优化、性能调优以及防坑指南（比如 Windows 下的 cp125x 编码问题）。', tasks: ['掌握 Token 压缩技巧 (/compress)', '解决 Windows 文件编码陷阱'] },
            { id: 'lv12', chapter: '卷四：大师境界', title: 'Lv.12 时光法阵 (Cron 批处理)', desc: '让 Agent 脱离你的监督自动工作。配置定时任务进行数据整理或批量处理脚本。', tasks: ['设定第一个 Cron 定时任务', '运行批量处理流程'] },
            { id: 'lv13', chapter: '卷四：大师境界', title: 'Lv.13 记忆宫殿 (Memory & Skills)', desc: '教 Agent 保存工作流记忆并打包成可复用的 Skill（技能包）。', tasks: ['测试记忆持久化', '将一个重复操作打包为 Skill'] },
            { id: 'lv14', chapter: '卷四：大师境界', title: 'Lv.14 影分身之术 (并发委派)', desc: '使用 Delegate 功能，派生多个子 Agent 并行处理不同任务，极大提升效率。', tasks: ['派发并发任务', '整合子 Agent 的汇报结果'] },
            { id: 'lv15', chapter: '卷四：大师境界', title: 'Lv.15 协议融合 (MCP & Python)', desc: '通过 MCP (模型上下文协议) 接入外部工具，或将其作为 Python 库集成到你自己的脚本中。', tasks: ['连接外部 MCP 服务器', '编写调用 Hermes 的 Python 脚本'] },
            { id: 'lv16', chapter: '卷五：创造者', title: 'Lv.16 源码解剖 (Architecture)', desc: '深入理解 Provider Routing 和底层代理架构，了解它大脑的运作方式。', tasks: ['阅读系统架构图', '配置多模型路由策略'] },
            { id: 'lv17', chapter: '卷五：创造者', title: 'Lv.17 锻造大师 (自定义工具)', desc: '打破限制，利用 Python 为你的 Agent 编写专属的系统级互动工具。', tasks: ['阅读 Developer Guide', '成功注册并调用一个自定义工具'] },
            { id: 'lv18', chapter: '卷五：创造者', title: 'Lv.18 极致特训 (RL Training)', desc: '最后的试炼。利用强化学习（RL）流水线，通过你的算力集群不断微调模型，打造专属于你的终极神明。', tasks: ['配置 RL 环境', '跑通一次简单的微调迭代过程'] }
        ];

        let savedProgress = JSON.parse(localStorage.getItem('hermesProgress')) || {};

        function renderSidebar() {
            const list = document.getElementById('questList');
            list.innerHTML = '';
            let currentChapter = '';

            quests.forEach((q, index) => {
                if (q.chapter !== currentChapter) {
                    currentChapter = q.chapter;
                    list.innerHTML += `<div class="chapter-title">${currentChapter}</div>`;
                }
                const isCompleted = savedProgress[q.id];
                list.innerHTML += `<button class="level-btn ${isCompleted ? 'completed' : ''}" onclick="showQuest('${q.id}', ${index})">
                    ${isCompleted ? '✅ ' : '🔒 '} ${q.title}
                </button>`;
            });
            updateProgressBar();
        }

        function showQuest(id, index) {
            const q = quests.find(v => v.id === id);
            
            // 更新选中状态
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.level-btn')[index].classList.add('active');

            let tasksHtml = q.tasks.map((task, i) => `
                <label>
                    <input type="checkbox" onchange="toggleTask('${id}', ${i})" id="task_${id}_${i}" ${savedProgress[id] && savedProgress[id][i] ? 'checked' : ''}>
                    ${task}
                </label>
            `).join('');

            const promptText = `你好！我已经准备好进入 Hermes 通关系统的【${q.title}】。
请给我这份关卡（${q.id}）的详细文档精髓、实战操作指引，以及验收通关的标准！`;

            document.getElementById('questDisplay').innerHTML = `
                <h2>${q.title}</h2>
                <p style="color: var(--text-muted); margin-bottom: 20px;">${q.desc}</p>
                
                <div class="checkbox-group">
                    <h3>🏆 本关目标任务</h3>
                    ${tasksHtml}
                </div>

                <hr style="border-color: var(--border); margin: 30px 0;">
                
                <h3>🤖 向 AI 呼叫支援</h3>
                <p>点击下方按钮复制这段暗号。然后<strong>开启一个新的对话窗口</strong>，把暗号发给 AI 助手，获取本关的详细图文攻略与代码：</p>
                <div style="background: #0f172a; padding: 15px; border-radius: 6px; margin-top: 10px; font-family: monospace;">
                    ${promptText}
                </div>
                <button class="copy-prompt-btn" onclick="navigator.clipboard.writeText('${promptText}'); alert('暗号已复制！去开个新对话发给 AI 吧！')">
                    📋 复制求助暗号
                </button>
            `;
        }

        function toggleTask(questId, taskIndex) {
            if (!savedProgress[questId]) savedProgress[questId] = {};
            savedProgress[questId][taskIndex] = document.getElementById(`task_${questId}_${taskIndex}`).checked;
            
            // 检查整个关卡是否完成
            const q = quests.find(v => v.id === questId);
            let allCompleted = true;
            for(let i=0; i<q.tasks.length; i++) {
                if(!savedProgress[questId][i]) {
                    allCompleted = false;
                    break;
                }
            }
            
            if(allCompleted && Object.keys(savedProgress[questId]).length === q.tasks.length) {
                savedProgress[questId].completed = true;
            } else {
                savedProgress[questId].completed = false;
            }

            localStorage.setItem('hermesProgress', JSON.stringify(savedProgress));
            renderSidebar();
        }

        function updateProgressBar() {
            const total = quests.length;
            const completed = quests.filter(q => savedProgress[q.id] && savedProgress[q.id].completed).length;
            const percentage = Math.round((completed / total) * 100);
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressText').innerText = `完成度: ${percentage}% (${completed}/${total})`;
        }

        renderSidebar();
    </script>
</body>
</html>
